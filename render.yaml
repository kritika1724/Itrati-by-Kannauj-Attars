services:
  - type: web
    name: kannauj-attars
    runtime: node
    buildCommand: npm run build:render
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: CORS_ORIGIN
        value: "https://itratibykannaujattars.in"
      - key: FRONTEND_ORIGIN
        value: "https://itratibykannaujattars.in"
      - key: BACKEND_PUBLIC_URL
        value: "https://itratibykannaujattars.in"
